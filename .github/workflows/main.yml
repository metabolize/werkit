name: CI

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 17 * * *'

jobs:
  check_code_format:
    name: Check code format
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.ref == 'refs/heads/main')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: ./.github/workflows/common

    - name: Check code format
      run: ./dev.py black-check

  check_types:
    name: Check types
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: ./.github/workflows/common

    - name: Check types
      run: ./dev.py check-types

  check_lint:
    name: Check lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.ref == 'refs/heads/main')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: ./.github/workflows/common

    - name: Check lint
      run: ./dev.py lint

  run_tests:
    name: Run tests - Python ${{ matrix.python-version }}, NumPy ${{ matrix.numpy-version }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.ref == 'refs/heads/main')

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
          - python-version: '3.11'
          - python-version: '3.12'
          - python-version: '3.13'
          - python-version: '3.14'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: ./.github/workflows/common
      with:
        python-version: ${{ matrix.python-version }}
        extras-param: '--extras client --extras lambda_common --extras compute_graph'

    - name: Run tests
      run: ./dev.py coverage
      env:
        AWS_DEFAULT_REGION: ${{ secrets.OSS_AWS_DEFAULT_REGION }}
        AWS_ACCESS_KEY_ID: ${{ secrets.OSS_AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_AWS_SECRET_ACCESS_KEY }}
        INTEGRATION_TEST_BUCKET: ${{ secrets.INTEGRATION_TEST_BUCKET }}
        INTEGRATION_TEST_LAMBDA_ROLE: ${{ secrets.INTEGRATION_TEST_LAMBDA_ROLE }}

  build_and_upload:
    name: Build and upload
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.ref == 'refs/heads/main')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: ./.github/workflows/common

    - name: Build the package
      run: poetry build

    - name: Upload distributable
      uses: actions/upload-artifact@v4
      with:
        name: dist-artifacts
        path: dist/

    - name: Build the documentation
      if: always()
      run: ./dev.py doc
